version: '3.8'

services:
  longhorn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: longhorn-app
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - DB_PATH=${DB_PATH:-/app/data/longhorn.db}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./uploads:/app/server/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - longhorn-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: longhorn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - longhorn
    networks:
      - longhorn-network
    profiles:
      - with-nginx

networks:
  longhorn-network:
    driver: bridge
